<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">

  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="{{ '/assets/images/favicon_io/favicon.ico' | relative_url }}">

  <link rel="icon" type="image/png" sizes="32x32"
        href="{{ '/assets/images/favicon_io/favicon-32x32.png' | relative_url }}">

  <link rel="icon" type="image/png" sizes="16x16"
        href="{{ '/assets/images/favicon_io/favicon-16x16.png' | relative_url }}">

  <link rel="apple-touch-icon"
        href="{{ '/assets/images/favicon_io/apple-touch-icon.png' | relative_url }}">

  <link rel="manifest"
        href="{{ '/assets/images/favicon_io/site.webmanifest' | relative_url }}">

  <!-- Main stylesheet -->
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
</head>
