<!-- _includes/header.html -->

<header class="site-header">
  <div class="container header-inner">

    <a href="{{ '/' | relative_url }}" class="site-logo" aria-label="Patchara Thai Massage home">
      <img
        src="{{ '/assets/images/logo.webp' | relative_url }}"
        alt="Patchara Thai Massage"
        class="site-logo-image"
      >
    </a>

    <button
      class="mobile-nav-toggle"
      type="button"
      aria-label="Open navigation"
      aria-expanded="false"
      onclick="document.body.classList.toggle('nav-open'); this.setAttribute('aria-expanded', document.body.classList.contains('nav-open') ? 'true' : 'false');"
    >
      <span></span>
      <span></span>
      <span></span>
    </button>

    <div
      class="mobile-nav-overlay"
      onclick="document.body.classList.remove('nav-open'); document.querySelector('.mobile-nav-toggle').setAttribute('aria-expanded', 'false');"
    ></div>

    <div class="header-right">
      <div class="mobile-menu-head">
        <img
          src="{{ '/assets/images/logo.png' | relative_url }}"
          alt="Patchara Thai Massage"
          class="mobile-menu-logo"
        >
      </div>

      <nav class="site-nav" aria-label="Main navigation">
        <a href="#about" onclick="document.body.classList.remove('nav-open')">Welcome</a>
        <a href="#treatments" onclick="document.body.classList.remove('nav-open')">Treatments</a>
        <a href="#prices" onclick="document.body.classList.remove('nav-open')">Prices</a>
        <a href="#reviews" onclick="document.body.classList.remove('nav-open')">Reviews</a>
        <a href="#contact" onclick="document.body.classList.remove('nav-open')">Contact</a>
      </nav>

      <a href="tel:01612720430" class="header-button">
        Book now
      </a>

      <a href="tel:01612720430" class="mobile-menu-phone">
        0161 272 0430
      </a>
    </div>

  </div>
</header>
